<!doctype html>
<!-- data-app="tripwala" remaps --color-primary* to the suite's Coral accent
     (#FF7A59) at runtime — every primary action / active state picks it up with
     no per-component config. The coral "wala" thread is never remapped. -->
<html lang="en" class="h-full" data-app="tripwala">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <!-- interactive-widget=resizes-content: the on-screen keyboard resizes the
         LAYOUT viewport (and 100dvh), so the AppShell reflows into the space the
         keyboard leaves rather than stranding blank background where it was when
         the keyboard opens/dismisses (notably on a mobile app-switch). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#FF7A59" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-full antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
